runtime: nodejs18

basic_scaling:
  max_instances: 1

handlers:
  # Static assets with long caching
  - url: /assets
    static_dir: dist/assets
    expiration: "30d"

  # All other requests handled by index.html (Client-side routing)
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
    secure: always
